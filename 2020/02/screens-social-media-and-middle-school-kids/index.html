<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="Personally, I’m a huge fan of our middle school principal and his measured and thought provoking commentary on what is happening in the school. This is just a snippet from a recent newsletter, but thought it worthwhile to share:\nWe notice how much of the drama and struggle kids have at school is linked directly to the time and influences they are getting from social media, edgy television, and interactive gaming when those things go unmonitored. I can’t tell you how many friendship break-ups happen in 5th and 6th grade because someone insulted someone else while playing Fortnite! I can’t tell you how many issues that would have been forgotten by 4pm but have grown into anxiety because kids continue the petty conversations through their texting apps and social media late into the night. I can’t tell you how many parents seek the school to fix these things or label other people’s kids as “the problem” when the real problem is any kids having unlimited access to interactive technology when their brain is not developed enough to deal with it. This is a societal problem.\n"><title>Screens, Social Media, and Middle School Kids</title><link rel=canonical href=https://test.markjacobsen.net/2020/02/screens-social-media-and-middle-school-kids/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="Screens, Social Media, and Middle School Kids"><meta property='og:description' content="Personally, I’m
