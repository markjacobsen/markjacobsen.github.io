<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="Now here’s a super geeky one for you, but also super helpful when doing DB2 dev on AIX. Thanks to one of our App DBAs for providing this!\nPlease note that you will need DBADM rights to do some of these things so your mileage may vary.\nFirst you need to determine what command(s) to run…\nREORG(#1), RUNSTAT(#5), REBIND (#6) as a first step when performance is suffering REORG(#1) when you recieve a SQL0668N reason code 7 or any other SQL message indicating a REORG is required REORG(#1) after table alters or deleting lots of rows when you want to reclaim space. REORG(#2) when you recieve a ADM6044E or a SQL2216N SQL error “-289” on a REORG (#1) CLEAR LOAD PENDING (#3) when you recieve a SQL0668N reason code 3 RUNSTAT(#5) after REORGs(#1 or #2), data volume changes(+10%), and/or adding indexes EMPTY A TABLE WITH A LOAD REPLACE(#4) when you want to empty a medium or larger sized table REBIND(#6) after every RUNSTAT(#5) if you are using stored procedures SET INTEGRITY(#7) to fix SQL0668N reason code 1 Then change the command syntax to match the required objects. All parameters starting with a dollar sign($) e.g. $TABSCHEMA, $TABNAME, $ROUTINESCHEMA, $ROUTINENAME, and/or $STEMP_TBSPACE must be replaced with valid table schema/name, stored procedure schema/name, system temporary tablespace.\n"><title>Seven commands developers can run to resolve issues in DB2 AIX development</title><link rel=canonical href=https://test.markjacobsen.net/2012/12/six-commands-developers-can-run-to-resolve-issues-in-db2-aix-development/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:w
