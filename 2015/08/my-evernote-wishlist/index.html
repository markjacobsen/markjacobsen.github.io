<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="I’ll admit right off the bat that I love Evernote. It has a ton going for it and is extremely flexible. I’ve been a premium subscriber for 3+ years now so I think have a good handle on the things I would really love to see integrated into the platform.\nRecurring Reminders – It’s nice to be able to get a reminder, but what about that weekly status report? iCal Integration – I get it, you want to keep people on the platform but if I can’t see reminders on my calendar there’s less chance of me opening up the app in the first place (prob even more true for new users) Differentiate between overdue and future reminders. When I look at my reminders all I see is a huge list until I do the mental processing to say “oh, that’s not due until next week” Stop clearing my iPhone reminder notices. As soon as I open up the app, and close it I have no more visual indicator that I have something in there waiting for me. My suggestion would be to give users a couple options for what they want the little red counter to represent: Due Today and Overdue Reminders Overdue Reminders Include Unread Chat Count Email tasks – I’ve sent this one in a number of times, but I’ll list it here to. I love the Evernote email integration, but why can’t I email myself a task? It could be as simple as all “[]” get converted to task checkboxes. (ex: “[] Pick up milk”) Improved search – I get it. The natural language and search in docs/images is great! But why can’t I easily search for all my overdue reminders? Or things due between this date and that? I don’t want to have to go to notes and click on the reminder icon that keeps moving but doesn’t show up unless your in snippet view. I should just be able to search “due:overdue” or “due:today”. Check out RTM, Gmail, etc. There’s a ton of companies doing this so not sure why you can’t. Web merge / multi-edit – One of the things I like the most about the desktop client is the ability to select multiple notes and merge them or edit (add tags, move to a notebook, etc). Would love this ability from the web client! Email clipper – When work doesn’t allow it or you’re on the go, to be able to send an email with a subject like “clip:http://freedomre.com” to my Evernote email address and have it clip the site/article to my account (instead of just creating a note w/ the link) would be awesome! Oh, and I’d also like to report what appears to be a bug. If I email multiple tags with a reminder the first tag and reminder get set, but the 2nd tag gets put in the note title (ex: “This is a note @_Inbox #tag 1 #tag 2 !tomorrow” gets turned into a note with the title “This is a note #tag 2”).\n"><title>My Evernote Wishlist</title><link rel=canonical href=https://test.markjacobsen.net/2015/08/my-evernote-wishlist/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="My Evernote Wishlist"><meta property='og:description' content="I’ll admit right off the bat that I love Evernote. It has a ton going for it and is extremely flexible. I’ve been a premium subscriber for 3+ years now so I think have a good handle on the things I would really love to see integrated into the platform.\nRecurring Reminders – It’s nice to be able to get a reminder, but what about that weekly status report? iCal Integration – I get it, you want to keep people on the platform but if I can’t see reminders on my calendar there’s less chance of me opening up the app in the first place (pr
