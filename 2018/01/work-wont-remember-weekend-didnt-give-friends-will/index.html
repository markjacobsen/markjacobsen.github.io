<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="Read the full article here\u00a0but this was my main takeaway…\nI worked weekends on many occasions. One weekend a good friend from university was coming to New York on the way to a business trip in Chicago. He was only coming to see me. But IBM had asked me to work that weekend. I struggled to choose between them, trying to work out if I could do both. I couldn’t. So I told my employer I could not work. Dwin and I had a great weekend exploring the city. He is the godfather to my daughter and we see each other regularly. IBM does not remember that I did not work that weekend. Dwin would always have.\n"><title>Work Won’t Remember That Weekend You Didn’t Give It. Friends Will.</title><link rel=canonical href=https://test.markjacobsen.net/2018/01/work-wont-remember-weekend-didnt-give-friends-will/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="Work Won’t Remember That Weekend You Didn’t Give It. Friends Will."><meta property='og:description' content="Read the full article here\u00a0but this was my main takeaway…\nI worked weekends on many occasions. One weekend a good friend from university was coming to New York on the way to a business trip in Chicago. He was only coming to see me. But IBM had asked me to work that weekend. I struggled to choose between them, trying to work out if I could do both. I couldn’t. So I told my employer I could not work. Dwin and I had a great weekend exploring the city. He is the godfather to my daughter and we see each other regularly. IBM does not remember that I did not work that weekend. Dwin would always have.\n"><meta property='og:url' content='https://test.markjacobsen.net/2018/01/work-wont-remember-weekend-didnt-give-friends-will/'><meta property='og:site_name' content='MarkJacobsen.net'><meta property='og:type' content='article'><meta property='article:section' content='Posts'><meta property='article:tag' content='article'><meta property='article:tag' content='linkedin'><meta property='article:tag' content='ready'><meta property='article:published_time' content='2018-01-04T11:30:00+00:00'><meta property='article:modified_time' content='2018-01-04T11:30:00+00:00'><meta name=twitter:title content="Work Won’t Remember That Weekend You Didn’t Give It. Friends Will."><meta name=twitter:description content="Read the full article here\u00a0but this was my main takeaway…\nI worked weekends on many occasions. One weekend a good friend from university was coming to New York on the way to a business trip in Chicago. He was only coming to see me. But IBM had asked me to work that weekend. I struggled to choose between them, trying to work out if I could do both. I couldn’t. So I told my employer I could not work. Dwin and I had a great weekend exploring the city. He is the godfather to my daughter and we see each other regularly. IBM does not remember that I did not work that weekend. Dwin would always have.\n"></head><body class=article-page><script>(function(){const e="StackColorScheme";localStorage.getItem(e)||localStorage.setItem(e,"auto")})()</script><script>(function(){const t="StackColorScheme",e=localStorage.getItem(t),n=window.matchMedia("(prefers-color-scheme: dark)").matches===!0;e=="dark"||e==="auto"&&n?document.documentElement.dataset.scheme="dark":document.documentElement.dataset.scheme="light"})()</script><div class="container main-container flex on-phone--column extended"><aside class="sidebar left-side
