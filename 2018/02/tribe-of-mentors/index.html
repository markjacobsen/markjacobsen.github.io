<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="Just finished Tribe of Mentors by Tim Ferriss which is really just a follow up to Tools of Titans if you ask me. That said, there’s still some wisdom here that is worth considering. Find some of my highlights and points to ponder below.\naddiction is when we’ve “lost the freedom to abstain.” Let us reclaim that freedom. While everyone else is running around with a list of responsibilities a mile long—things they’re not actually responsible for—you’ve got just that one-item list. You’ve got just one thing to manage: your choices, your will, your mind. So mind it. Most teenagers choose to fool around rather than exert themselves. Halfhearted, lazy effort gives them a ready-made excuse: “It doesn’t matter. I wasn’t even trying.” One of the most powerful things you can do as a human being in our hyperconnected, 24/7 media world is say: “I don’t know.” Or, more provocatively: “I don’t care.” There is almost no situation in which hatred helps. Yet almost every situation is made better by love—or empathy, understanding, appreciation We’d rather be pissed off, bitter, raging inside than risk an awkward conversation that might actually help this person and make the world a better place. We don’t just want people to be better, we expect it to magically happen amor fati (a love of fate). It’s not just accepting, it’s loving everything that happens. Let’s not confuse acceptance with passivity. Perhaps today will be the day when we experience happiness or wisdom. Don’t try to grab that moment and hold on to it with all your might. It’s not under your control how long it lasts. Enjoy it, recognize it, remember it. Having it for a moment is the same as having it forever. there is one thing and only one thing that causes unhappiness. The name of that thing is Attachment. Don’t let another day tick away in ignorance of the reality that you’re a dying person. We all are. Can today be the day we stop pretending otherwise? while we might be good at protecting our physical property, we are far too lax at enforcing our mental boundaries. Property can be regained; there is quite a bit of it out there—some of it still untouched by man. But time? Time is our most irreplaceable asset—we cannot buy more of it. We can only strive to waste as little as possible. Please remember to subscribe to the newsletter or feed to stay up to date!\n"><title>Tribe of Mentors</title><link rel=canonical href=https://test.markjacobsen.net/2018/02/tribe-of-mentors/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="Tribe of Mentors"><meta property='og:description' content="Just finished Tribe of Mentors by Tim Ferriss which is really just a follow up to Tools of Titans if you ask me. That said, there’s still some wisdom here that is worth considering. Find some of my highlights and points to ponder below.\naddiction is when we’ve “lost the freedom to abstain.” Let us reclaim that freedom. While everyone else is running around with a list of responsibilities a mile long—things they’re not actually responsible for—you’ve got just that one-item list. You’ve got just one thing to manage: your choices, your will, your mind. So mind it. Most teenagers choose to fool around rather than exert themselves. Halfhearted, lazy effort gives them a ready-made excuse: “It doesn’t matter. I wasn’t even trying.” One of the most powerful things you can do as a human being in our hyperconnected, 24/7 media world
