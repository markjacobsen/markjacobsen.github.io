<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content=" Last week, an obscure but potentially internet-transforming document was leaked from the U.S. Federal Communications Commission. It revealed that government regulators are considering rules that would give big companies a chance to make their online services run faster than smaller ones.\nPersonally, the thing I like least about it is that it’s easy to see how small/new companies could get screwed and stifle innovation. The other thing that I had not though of until I read this is I trust the cable companies so little that I wouldn’t be surprised if they started “bundling” sites like they do with TV. I don’t need 100 channels! Of course, this is why I don’t have cable TV. Finally, the other thing you should be upset about is the cable companies “double dipping”. They’re already charging insane prices (because usually they have a monopoly in most areas other then major metros), and now they’re also going to start extorting the companies too – what, you didn’t think they’d actually lower your rates when they started charging the companies did you?… Comcrap-Warner wants it’s cake and to eat it too (see the video below – warning: language).\n"><title>The Internet Is About to Become Worse Than Television #1aDay</title><link rel=canonical href=https://test.markjacobsen.net/2014/05/the-internet-is-about-to-become-worse-than-television/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="The In
