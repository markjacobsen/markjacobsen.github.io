<!doctype html><html lang=en-us dir=ltr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><meta name=description content="This “little” 🙂 query will do it for you. Just change the where clause at the bottom…\nSELECT Type_X AS &#34;Type&#34; , RefObj_X AS &#34;Referencing Object&#34; FROM ( SELECT RTRIM(SYSPROC.PROCSCHEMA)||'.'||RTRIM(SYSPROC.PROCNAME) AS RefObj_X , RTRIM(SYSPROC.PROCSCHEMA) AS Schema_X , RTRIM(SYSPROC.PROCNAME) AS Obj_X , RTRIM(PDEP.BSCHEMA)||'.'||RTRIM(PDEP.BNAME) AS BaseObj_X , 'Proc' AS Type_X FROM SYSCAT.PACKAGEDEP PDEP INNER JOIN SYSIBM.sysdependencies SYSDEP ON SYSDEP.BSCHEMA = PDEP.BSCHEMA AND SYSDEP.BNAME = PDEP.PKGNAME INNER JOIN SYSIBM.sysprocedures SYSPROC ON SYSDEP.DNAME = SYSPROC.SPECIFICNAME UNION ALL SELECT RTRIM(TRIGSCHEMA)||'.'||RTRIM(TRIGNAME) AS RefObj_X , RTRIM(TRIGSCHEMA) AS Schema_X , RTRIM(TRIGNAME) AS Obj_X , RTRIM(BSCHEMA)||'.'||RTRIM(BNAME) AS BaseObj_X , 'Trigger' AS Type_X FROM SYSCAT.TRIGDEP UNION ALL SELECT RTRIM(VIEWSCHEMA)||'.'||RTRIM(CAST((VIEWNAME) AS CHAR(126))) AS RefObj_X , RTRIM(VIEWSCHEMA) AS Schema_X , RTRIM(CAST((VIEWNAME) AS CHAR(126))) AS Obj_X , RTRIM(BSCHEMA)||'.'||RTRIM(BNAME) AS BaseObj_X , CASE DTYPE WHEN 'S' THEN 'SUMMARY TABLE' ELSE 'View' END AS Type_X FROM SYSCAT.VIEWDEP UNION ALL SELECT RTRIM(INDSCHEMA)||'.'||RTRIM(INDNAME) AS RefObj_X , RTRIM(INDSCHEMA) AS Schema_X , RTRIM(INDNAME) AS Obj_X , RTRIM(TABSCHEMA)||'.'||RTRIM(TABNAME) AS BaseObj_X , 'Index' AS Type_X FROM SYSCAT.INDEXES UNION ALL SELECT RTRIM(TABSCHEMA)||'.'||RTRIM(TABNAME) AS RefObj_X , RTRIM(TABSCHEMA) AS Schema_X , RTRIM(TABNAME) AS Obj_X , RTRIM(BASE_TABSCHEMA)||'.'||RTRIM(BASE_TABNAME) AS BaseObj_X , 'Alias' AS Type_X FROM SYSCAT.TABLES WHERE TYPE = 'A' UNION ALL SELECT DISTINCT RTRIM(CAST(RTRIM(TABSCHEMA) AS VARCHAR(126))) || '.' || RTRIM(TABNAME) AS RefObj_X , RTRIM(CAST(RTRIM(TABSCHEMA) AS VARCHAR(126))) AS Schema_X , RTRIM(TABNAME) AS Obj_X , RTRIM(REFTABSCHEMA)||'.'||RTRIM(REFTABNAME) AS BaseObj_X , 'Table' AS Type_X FROM SYSCAT.REFERENCES ) AS RefTbl WHERE BaseObj_X = 'XX.MY_TABLE' ORDER BY Type_X , RefObj_X;</pre> <p>_Please remember to subscribe to the <a href=&#34;https://markjacobsen.net/newsletter&#34; target=&#34;_blank&#34;>newsletter</a> or <a href=&#34;https://markjacobsen.net/feed&#34; target=&#34;_blank&#34;>feed</a> to stay up to date!_</p> _<small>Disclaimer: Thoughts and opinions are my own, and do not reflect the views of any employer, family member, friend, or anyone else. Some links may be affiliate links, but I don't link to anything I don't use myself.</small>_ "><title>How to Tell What Objects Reference a DB2 Table</title><link rel=canonical href=https://test.markjacobsen.net/2014/04/how-to-tell-what-objects-reference-a-db2-table/><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=preload as=style href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"><link rel=stylesheet href=/scss/style.min.909abd696906b2e227ef47743706683155b1997067c9af78569a13f22f68c2fc.css><meta property='og:title' content="How to Tell What Objects Reference a DB2 Table"><meta property='og:description' content="This “little” 🙂 query will do it for you. Just change the where clause at the bottom…\nSELECT Type_X AS &#34;Type&#34; , RefObj_X AS &#34;Referencing Object&#34; FROM ( SELECT RTRIM(SYSPROC.PROCSCHEMA)||'.'||RTRIM(SYSPROC.PROCNAME) AS RefObj_X , RTRIM(SYSPROC.PROCSCHEMA) AS Schema_X , RTRIM(SYSPROC.PROCNAME) AS Obj_X , RTRIM(PDEP.BSCHEMA)||'.'||RTRIM(PDEP.BNAME) AS BaseObj_X , 'Proc' AS Type_X FROM SYSCAT.PACKAGEDEP PDEP INNER JOIN SYSIBM.sysdependencies SYSDEP ON SYSDEP.BSCHEMA = PDEP.BSCHEMA AND SYSDEP.BNAME = PDEP.PKGNAME INNER JOIN SYSIBM.sysprocedures SYSPROC ON SYSDEP.DNAME = SYSPROC.SPECIFICNAME UNION ALL SELECT RTRIM(TRIGSCHEMA)||'.'
